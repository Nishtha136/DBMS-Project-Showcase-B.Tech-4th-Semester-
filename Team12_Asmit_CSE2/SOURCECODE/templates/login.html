<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Farmer Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fb 0%, #e5ebf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .auth-logo {
            width: 60px;
            height: 60px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            background-color: #f9f9f9;
            font-size: 14px;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
            border-color: #2e7d32;
            background-color: #fff;
        }
        .form-label {
            font-weight: 500;
            color: #4a4a4a;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .btn-primary-custom {
            background: #2e7d32;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        }
        .link-muted {
            color: #757575;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .link-muted:hover { color: #2e7d32; }
        
        /* Query Toast Styles */
        .query-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fff;
            border-left: 4px solid #0d6efd;
            border-radius: 10px;
            padding: 20px 25px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            max-width: 650px;
            width: 90%;
            z-index: 9999;
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from { transform: translateX(500px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .query-toast-title { font-size: 14px; font-weight: 700; color: #0d6efd; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .query-toast-query { font-size: 13px; background: #f8f9fa; padding: 12px; border-radius: 6px; border-left: 3px solid #0d6efd; font-family: 'Courier New', monospace; color: #333; margin-bottom: 12px; max-height: 120px; overflow-y: auto; line-height: 1.5; word-break: break-word; }
        .query-toast-explanation { font-size: 13px; color: #555; line-height: 1.6; }
        .toast-close-btn { background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s; }
        .toast-close-btn:hover { color: #333; }
    </style>
</head>
<body>

<div class="auth-card">
  
    <h3 class="text-center fw-bold mb-1" style="color: #2c3e50;">Welcome Back</h3>
    <p class="text-center text-muted mb-4" style="font-size: 14px;">Sign in to continue to Marketplace</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger" style="border-radius: 10px; font-size: 14px;">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">I am a:</label>
            <select name="role" id="roleSelect" class="form-select" onchange="toggleAdmin()">
                <option value="farmer">Farmer</option>
                <option value="buyer">Buyer</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <div class="mb-4">
            <label id="inputLabel" class="form-label">Registered Phone Number:</label>
            <input type="text" name="identifier" id="inputField" class="form-control" required placeholder="e.g., 9876543210">
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 text-white mb-3">Login Securely</button>
        <div class="text-center">
            <a href="/register" class="link-muted">Don't have an account? <span class="fw-bold" style="color: #2e7d32;">Sign Up</span></a>
        </div>
    </form>
</div>

<script>
    let lastQueryCode = null;

    function toggleAdmin() {
        const role = document.getElementById('roleSelect').value;
        const inputLabel = document.getElementById('inputLabel');
        const inputField = document.getElementById('inputField');

        if (role === 'admin') {
            inputLabel.innerText = 'Admin Password:';
            inputField.type = 'password';
            inputField.placeholder = 'Enter admin password';
        } else {
            inputLabel.innerText = 'Registered Phone Number:';
            inputField.type = 'text';
            inputField.placeholder = 'e.g., 9876543210';
        }
    }

    function showQueryToast(queryCode, explanation, rowCount, executedTime) {
      
        if (lastQueryCode === queryCode) return;
        lastQueryCode = queryCode;

        const container = document.body;
        
      
        const oldToast = document.querySelector('.query-toast');
        if (oldToast) {
            oldToast.remove();
        }
        
        const toast = document.createElement('div');
        toast.className = 'query-toast';
        toast.innerHTML = `
            <div class="query-toast-title">
                <span><i class="bi bi-lightning-fill"></i> Query Executed</span>
                <button class="toast-close-btn" onclick="this.parentElement.parentElement.remove()">&times;</button>
            </div>
            <div class="query-toast-query">${escapeHtml(queryCode)}</div>
            <div class="query-toast-explanation"><strong>Fetching:</strong> ${explanation}</div>
            <small class="text-muted d-block mt-2"><i class="bi bi-hourglass-split"></i> ${rowCount} rows | ${executedTime}</small>
        `;
        
        container.appendChild(toast);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function loadQueryDetails() {
        fetch('/api/query_details')
            .then(response => response.json())
            .then(data => {
                if (data.query_code) {
                    showQueryToast(data.query_code, data.query_explanation, data.rows_returned, data.executed_at);
                }
            })
            .catch(error => console.error('Error loading query details:', error));
    }

  
    document.addEventListener('DOMContentLoaded', function() {
        loadQueryDetails();

        setInterval(loadQueryDetails, 2000);
    });
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</body>
</html>
