version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laundry-buddy-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL_REQUIRED}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET_REQUIRED}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET_REQUIRED}
      JWT_EXPIRE: 7d
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://frontend:3000
    networks:
      - laundry-network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laundry-buddy-frontend
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      - backend
    networks:
      - laundry-network
    environment:
      VITE_API_URL: http://localhost:3000/api

networks:
  laundry-network:
    driver: bridge
